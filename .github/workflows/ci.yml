name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify manifest/package version in sync
        run: npm run version-check

      - name: Verify icon files exist
        run: |
          for f in icons/icon16.png icons/icon48.png icons/icon128.png; do
            test -f "$f" || { echo "Missing icon: $f"; exit 1; }
          done

      - name: Run all tests
        run: npm test

      - name: Verify release ZIP builds without errors
        if: matrix.node-version == '20'
        run: npm run build:zip
