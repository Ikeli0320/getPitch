<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>getPitch</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">

  <header>
    <span class="logo">🎵</span>
    <h1>getPitch</h1>
  </header>

  <div id="msg-bar" class="hidden" role="alert" aria-live="assertive"></div>

  <div id="song-title-bar" class="hidden">
    <span id="song-title"></span>
  </div>

  <section id="results">

    <!-- 原曲調號：value + staff side by side -->
    <div class="card">
      <span class="card-label">原曲調號</span>
      <div class="key-row">
        <div>
          <div id="detected-key" class="value">—</div>
          <div id="key-progress">
            <div class="progress-bar hidden" id="key-progress-bar"
                 role="progressbar" aria-label="調號鎖定進度"
                 aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
              <div class="progress-inner" id="key-progress-inner" style="width:0%"></div>
            </div>
            <span class="status hidden" id="key-locked-label" aria-live="polite">已鎖定 ✓</span>
            <span class="status hidden conf-warn" id="key-conf-warn" aria-live="polite">⚠ 信心不足</span>
          </div>
        </div>
        <div id="key-sig-staff" aria-label="無升降記號" role="img"></div>
      </div>
    </div>

    <!-- 最高音 + 拍速：two mini cards in one row -->
    <div class="twin-row">
      <div class="card mini">
        <span class="card-label">最高音</span>
        <div id="max-note" class="value">—</div>
        <div id="max-note-solfege" class="solfege"></div>
        <div class="status" id="note-status"></div>
      </div>
      <div class="card mini">
        <span class="card-label">拍速</span>
        <div class="value-row">
          <span id="bpm-value" class="value">—</span>
          <span id="bpm-unit" class="solfege"></span>
        </div>
        <div class="status" id="bpm-status"></div>
      </div>
    </div>

    <!-- 推薦調號：value + staff side by side + slider -->
    <div class="card highlight">
      <span class="card-label">推薦調號（適合演唱）</span>
      <div class="key-row">
        <div>
          <div id="recommended-key" class="value">—</div>
          <div class="status" id="shift-info"></div>
        </div>
        <div id="rec-sig-staff" aria-label="無升降記號" role="img"></div>
      </div>
      <div class="slider-row">
        <span class="slider-label">微調</span>
        <input type="range" id="transpose-slider" min="-3" max="3" step="1" value="0"
               aria-label="微調（半音）" aria-valuenow="0" aria-valuetext="0 半音"
               aria-description="範圍：-3 到 +3 個半音">
        <span id="transpose-value" class="slider-val">0</span>
      </div>
    </div>

  </section>

  <section id="detail-section" class="hidden" aria-hidden="true">
    <hr>
    <div class="detail-row">
      <span>偵測狀態</span><span id="d-status">—</span>
    </div>
    <div class="detail-row">
      <span>偵測信心</span><span id="d-confidence">—</span>
    </div>
    <div class="detail-row">
      <span>調整半音</span><span id="d-shift">—</span>
    </div>
    <div class="detail-row">
      <span>可用調號</span>
      <div id="d-allowed" role="list" aria-label="可用調號"></div>
    </div>
  </section>

  <footer>
    <button id="start-btn" aria-label="開始分析">▶ 開始分析</button>
    <button id="detail-btn" aria-label="顯示詳細資訊" aria-expanded="false">詳細 ▼</button>
  </footer>
  <div id="version-bar"></div>

</div>
<script src="popup.js"></script>
</body>
</html>
